<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>16進位 / 2進位 / 10進位 轉換器</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --line: #cfd6dd;
      --text: #1f2937;
      --muted: #6b7280;
      --bit-on: #2563eb;
      --bit-off: #e5e7eb;
      --bit-on-text: #ffffff;
      --bit-off-text: #111827;
      --nibble-a: #fff7cc;
      --nibble-b: #eaf2ff;
      --accent: #0f766e;
      --error: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
    }

    h1 {
      font-size: 24px;
      margin: 0 0 8px;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 18px;
      line-height: 1.6;
    }

    .bit-table {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      margin-bottom: 18px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 1020px;
    }

    th, td {
      border: 1px solid var(--line);
      text-align: center;
      padding: 0;
      height: 44px;
    }

    th.label, td.label {
      min-width: 90px;
      padding: 0 10px;
      font-weight: 600;
      background: #f9fafb;
    }

    th.bit-index {
      min-width: 28px;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
    }

    .group-a { background: var(--nibble-a); }
    .group-b { background: var(--nibble-b); }

    .bit-btn {
      width: 100%;
      height: 44px;
      border: 0;
      cursor: pointer;
      font-size: 18px;
      font-weight: 700;
      transition: transform 0.04s ease, filter 0.15s ease;
    }

    .bit-btn:hover { filter: brightness(0.98); }
    .bit-btn:active { transform: scale(0.98); }

    .bit-btn.on {
      background: var(--bit-on);
      color: var(--bit-on-text);
    }

    .bit-btn.off {
      background: var(--bit-off);
      color: var(--bit-off-text);
    }

    .fields {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-weight: 600;
      font-size: 14px;
    }

    .field input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }

    .field input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96,165,250,0.18);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
    }

    .btn {
      border: 1px solid var(--line);
      background: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    .btn:hover { background: #f8fafc; }

    .range-box {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      background: #fcfcfd;
    }

    .range-grid {
      display: grid;
      grid-template-columns: 120px 120px 1fr;
      gap: 12px;
      align-items: end;
      margin-bottom: 12px;
    }

    .range-result {
      padding: 12px;
      border: 1px dashed var(--line);
      border-radius: 10px;
      background: #fff;
      line-height: 1.8;
      word-break: break-all;
      font-family: Consolas, "Courier New", monospace;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
    }

    .error {
      color: var(--error);
      font-weight: 600;
    }

    @media (max-width: 900px) {
      .fields { grid-template-columns: 1fr; }
      .range-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>16進位 / 2進位 / 10進位 轉換器</h1>
      <div class="sub">
        點選 bit 的 0 / 1 可直接切換該位元，並同步更新 16 進位與 10 進位數值。下方也可輸入 bit A 到 bit B 的範圍，擷取該段二進位值（含 A 與 B）。
      </div>

      <div class="bit-table">
        <table>
          <tr id="indexRow">
            <th class="label">bit</th>
          </tr>
          <tr id="bitRow">
            <td class="label">value</td>
          </tr>
        </table>
      </div>

      <div class="fields">
        <div class="field">
          <label for="hexInput">base16</label>
          <input id="hexInput" type="text" value="0x0000A3C1" />
        </div>
        <div class="field">
          <label for="decInput">base10</label>
          <input id="decInput" type="text" value="41921" />
        </div>
        <div class="field">
          <label for="binInput">base2</label>
          <input id="binInput" type="text" readonly />
        </div>
      </div>

      <div class="toolbar">
        <button class="btn" id="setZeroBtn">全部清成 0</button>
        <button class="btn" id="setOneBtn">全部設成 1</button>
        <button class="btn" id="invertBtn">全部反相</button>
      </div>

      <div class="range-box">
        <h2 style="margin:0 0 12px; font-size:20px;">擷取 bit A ~ bit B</h2>
        <div class="range-grid">
          <div class="field">
            <label for="bitA">bit A（低位）</label>
            <input id="bitA" type="number" min="0" max="31" value="0" />
          </div>
          <div class="field">
            <label for="bitB">bit B（高位）</label>
            <input id="bitB" type="number" min="0" max="31" value="7" />
          </div>
          <button class="btn" id="rangeBtn" style="height:44px;">取得範圍值</button>
        </div>
        <div id="rangeResult" class="range-result"></div>
        <div class="hint">限制：0 ≤ A &lt; B ≤ 31，輸出為從 bit B 到 bit A 的二進位字串。</div>
      </div>
    </div>
  </div>

  <script>
    const BIT_WIDTH = 32;
    let value = 0x0000A3C1 >>> 0;

    const indexRow = document.getElementById('indexRow');
    const bitRow = document.getElementById('bitRow');
    const hexInput = document.getElementById('hexInput');
    const decInput = document.getElementById('decInput');
    const binInput = document.getElementById('binInput');
    const bitAInput = document.getElementById('bitA');
    const bitBInput = document.getElementById('bitB');
    const rangeResult = document.getElementById('rangeResult');

    function nibbleClass(bitIndex) {
      return Math.floor((31 - bitIndex) / 4) % 2 === 0 ? 'group-a' : 'group-b';
    }

    function buildTable() {
      for (let i = BIT_WIDTH - 1; i >= 0; i--) {
        const th = document.createElement('th');
        th.className = `bit-index ${nibbleClass(i)}`;
        th.textContent = i;
        indexRow.appendChild(th);

        const td = document.createElement('td');
        td.className = nibbleClass(i);
        const btn = document.createElement('button');
        btn.className = 'bit-btn';
        btn.dataset.bit = i;
        btn.addEventListener('click', () => toggleBit(i));
        td.appendChild(btn);
        bitRow.appendChild(td);
      }
    }

    function toBinaryString(v) {
      return (v >>> 0).toString(2).padStart(BIT_WIDTH, '0');
    }

    function toHexString(v) {
      return '0x' + (v >>> 0).toString(16).toUpperCase().padStart(8, '0');
    }

    function updateDisplay() {
      for (const btn of document.querySelectorAll('.bit-btn')) {
        const bit = Number(btn.dataset.bit);
        const bitValue = (value >>> bit) & 1;
        btn.textContent = bitValue;
        btn.classList.toggle('on', bitValue === 1);
        btn.classList.toggle('off', bitValue === 0);
      }

      hexInput.value = toHexString(value);
      decInput.value = String(value >>> 0);
      binInput.value = toBinaryString(value);
      updateRange();
    }

    function toggleBit(bit) {
      value = (value ^ (1 << bit)) >>> 0;
      updateDisplay();
    }

    function setFromHex() {
      let raw = hexInput.value.trim();
      raw = raw.replace(/^0x/i, '');
      if (!/^[0-9a-fA-F]{1,8}$/.test(raw)) {
        alert('請輸入 1~8 位有效的 16 進位數字。');
        hexInput.value = toHexString(value);
        return;
      }
      value = parseInt(raw, 16) >>> 0;
      updateDisplay();
    }

    function setFromDec() {
      const raw = decInput.value.trim();
      if (!/^\d+$/.test(raw)) {
        alert('請輸入 0 ~ 4294967295 的 10 進位整數。');
        decInput.value = String(value >>> 0);
        return;
      }
      const big = BigInt(raw);
      if (big < 0n || big > 4294967295n) {
        alert('10 進位範圍需介於 0 ~ 4294967295。');
        decInput.value = String(value >>> 0);
        return;
      }
      value = Number(big) >>> 0;
      updateDisplay();
    }

    function updateRange() {
      const a = Number(bitAInput.value);
      const b = Number(bitBInput.value);

      if (!Number.isInteger(a) || !Number.isInteger(b) || a < 0 || b > 31 || b <= a) {
        rangeResult.innerHTML = '<span class="error">請輸入有效範圍：0 ≤ A &lt; B ≤ 31</span>';
        return;
      }

      const width = b - a + 1;
      const mask = width === 32 ? 0xFFFFFFFF : ((2 ** width) - 1);
      const sliced = (value >>> a) & mask;
      const bin = sliced.toString(2).padStart(width, '0');
      const hexDigits = Math.ceil(width / 4);
      const hex = '0x' + sliced.toString(16).toUpperCase().padStart(hexDigits, '0');

      rangeResult.innerHTML = `
        <div>範圍：bit ${b} ~ bit ${a}</div>
        <div>binary：${bin}</div>
        <div>decimal：${sliced}</div>
        <div>hex：${hex}</div>
      `;
    }

    document.getElementById('setZeroBtn').addEventListener('click', () => {
      value = 0;
      updateDisplay();
    });

    document.getElementById('setOneBtn').addEventListener('click', () => {
      value = 0xFFFFFFFF >>> 0;
      updateDisplay();
    });

    document.getElementById('invertBtn').addEventListener('click', () => {
      value = (~value) >>> 0;
      updateDisplay();
    });

    hexInput.addEventListener('change', setFromHex);
    decInput.addEventListener('change', setFromDec);
    bitAInput.addEventListener('input', updateRange);
    bitBInput.addEventListener('input', updateRange);
    document.getElementById('rangeBtn').addEventListener('click', updateRange);

    buildTable();
    updateDisplay();
  </script>
</body>
</html>
